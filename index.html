<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>風格資料庫 - 圖像生成提示詞</title>
<style>
:root{
  --bg:#08101d;
  --panel:#101b2c;
  --card:#132238;
  --card2:#0f1a2a;
  --line:#2a3d57;
  --text:#edf4ff;
  --muted:#92a6bf;
  --accent:#49a8ff;
  --accent2:#6fd6c9;
}
*{box-sizing:border-box}
body{
  margin:0;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 0%,#172a45 0,#0b1424 42%,#060b14 100%);
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;
}
.wrap{max-width:1680px;margin:auto;padding:26px 22px 18px}
header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:18px;
  margin-bottom:20px;
}
h1{margin:0 0 7px;font-size:28px;letter-spacing:0;font-weight:800}
.sub{color:var(--muted);font-size:14px}
.tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search,.select{
  height:42px;
  color:var(--text);
  background:#0d1828;
  border:1px solid var(--line);
  border-radius:8px;
  padding:0 13px;
  font:inherit;
}
.search{width:260px}
.search:focus,.select:focus{outline:2px solid #49a8ff55;border-color:var(--accent)}
.meta{
  display:flex;
  justify-content:space-between;
  gap:16px;
  color:var(--muted);
  font-size:13px;
  margin:0 0 12px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
}
.card{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 12px 28px #0005;
  min-width:0;
}
.thumbWrap{position:relative;background:#08101d}
.thumb{
  display:block;
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}
.cat{
  position:absolute;
  left:10px;
  bottom:10px;
  max-width:calc(100% - 20px);
  color:#dff2ff;
  background:#06101dcc;
  border:1px solid #ffffff26;
  border-radius:999px;
  padding:3px 8px;
  font-size:11px;
  backdrop-filter:blur(5px);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.body{padding:12px 12px 13px}
.titleRow{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}
h2{
  margin:0;
  font-size:14px;
  line-height:1.3;
  font-weight:800;
  overflow-wrap:anywhere;
}
.copy{
  flex:0 0 auto;
  width:32px;
  height:30px;
  display:grid;
  place-items:center;
  color:#d8efff;
  background:#123353;
  border:1px solid #2f78b8;
  border-radius:7px;
  cursor:pointer;
  font-size:14px;
}
.copy:hover{background:#17436b}
.copy.done{background:#16462f;border-color:#2f8354;color:#ddffe9}
.promptLabel{color:#99adc6;font-size:11px;margin-bottom:6px}
.prompt{
  color:#dce8f7;
  font-size:12.5px;
  line-height:1.65;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card.expanded .prompt{
  display:block;
  -webkit-line-clamp:unset;
}
.empty{
  display:none;
  text-align:center;
  color:var(--muted);
  border:1px solid var(--line);
  border-radius:8px;
  padding:26px;
  background:#0d1828;
}
footer{
  margin-top:12px;
  color:var(--muted);
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px;
  text-align:center;
  font-size:13px;
}
.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  transform:translateX(-50%) translateY(12px);
  color:#eafff5;
  background:#123522;
  border:1px solid #2d7c51;
  border-radius:999px;
  padding:8px 13px;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:.18s ease;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){
  .wrap{padding:18px 12px}
  header{display:block}
  h1{font-size:24px}
  .tools{margin-top:14px}
  .search,.select{width:100%}
  .meta{display:block}
  .grid{grid-template-columns:1fr;gap:12px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>風格資料庫 - 圖像生成提示詞</h1>
      <div class="sub">32 種 NotebookLM / Banana AI 圖像風格縮圖。每張縮圖只保留風格方向，提示詞可一鍵複製。</div>
    </div>
    <div class="tools">
      <input class="search" id="q" placeholder="搜尋風格或提示詞...">
      <select class="select" id="cat">
        <option value="">全部分類</option>
      </select>
    </div>
  </header>

  <div class="meta">
    <div id="count">載入中</div>
    <div>點擊複製按鈕取得英文提示詞</div>
  </div>

  <main class="grid" id="grid"></main>
  <div class="empty" id="empty">找不到符合條件的風格。</div>

  <footer>提示詞為英文版，縮圖為重新生成的原創示意圖，不使用原始縮圖構圖。</footer>
</div>
<div class="toast" id="toast">已複製英文提示詞</div>

<script src="styles.js"></script>
<script>
const data = Array.isArray(window.STYLE_PROMPTS) ? window.STYLE_PROMPTS : [];
const grid = document.querySelector("#grid");
const q = document.querySelector("#q");
const cat = document.querySelector("#cat");
const count = document.querySelector("#count");
const empty = document.querySelector("#empty");
const toast = document.querySelector("#toast");

const categories = [...new Set(data.map(item => item.category))];
categories.forEach(name => {
  const option = document.createElement("option");
  option.value = name;
  option.textContent = name;
  cat.appendChild(option);
});

async function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch(_){
      // Fall through to the textarea fallback for browsers that block clipboard writes.
    }
  }
  const area = document.createElement("textarea");
  area.value = text;
  area.style.position = "fixed";
  area.style.left = "0";
  area.style.top = "0";
  area.style.width = "1px";
  area.style.height = "1px";
  area.style.opacity = "0";
  area.setAttribute("readonly", "");
  document.body.appendChild(area);
  area.focus();
  area.select();
  area.setSelectionRange(0, text.length);
  const ok = document.execCommand("copy");
  area.remove();
  return ok;
}

function showToast(message = "已複製英文提示詞"){
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove("show"), 1200);
}

function cardTemplate(item){
  const article = document.createElement("article");
  article.className = "card";
  article.dataset.search = `${item.name} ${item.category} ${item.prompt}`.toLowerCase();
  article.dataset.category = item.category;
  article.innerHTML = `
    <div class="thumbWrap">
      <img class="thumb" src="${item.thumb}" alt="${item.name}" loading="lazy">
      <div class="cat">${item.category}</div>
    </div>
    <div class="body">
      <div class="titleRow">
        <h2>${item.name}</h2>
        <button class="copy" type="button" title="複製英文提示詞" aria-label="複製 ${item.name} 的英文提示詞">Copy</button>
      </div>
      <div class="promptLabel">Prompt</div>
      <div class="prompt">${item.prompt}</div>
    </div>
  `;
  article.querySelector(".copy").addEventListener("click", async () => {
    const button = article.querySelector(".copy");
    const ok = await copyText(item.prompt);
    if(ok){
      button.textContent = "OK";
      button.classList.add("done");
      showToast();
      setTimeout(() => {
        button.textContent = "Copy";
        button.classList.remove("done");
      }, 1100);
    }else{
      article.classList.add("expanded");
      showToast("瀏覽器阻擋複製，請手動選取提示詞");
    }
  });
  return article;
}

function render(){
  const term = q.value.trim().toLowerCase();
  const selected = cat.value;
  const filtered = data.filter(item => {
    const textMatch = !term || `${item.name} ${item.category} ${item.prompt}`.toLowerCase().includes(term);
    const catMatch = !selected || item.category === selected;
    return textMatch && catMatch;
  });
  grid.replaceChildren(...filtered.map(cardTemplate));
  empty.style.display = filtered.length ? "none" : "block";
  count.textContent = `顯示 ${filtered.length} / ${data.length} 種風格`;
}

q.addEventListener("input", render);
cat.addEventListener("change", render);
render();
</script>
</body>
</html>
